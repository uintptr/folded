name: Build Firefox Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Lint
        run: web-ext lint --source-dir .

      - name: Build
        run: web-ext build --source-dir . --artifacts-dir dist --overwrite-dest

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: folded-${{ steps.version.outputs.version }}
          path: dist/folded-${{ steps.version.outputs.version }}.zip

      - name: Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists, skipping."
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --notes "" \
              --repo "$GITHUB_REPOSITORY" \
              "dist/folded-$VERSION.zip"
          fi
